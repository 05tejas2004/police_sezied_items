<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Police Portal - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
            padding: 40px;
        }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo-icon { font-size: 60px; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo">
        <div class="logo-icon">👮</div>
        <h3 class="mt-3">Police Seized Item Portal</h3>
        <p class="text-muted">Secure Login</p>
    </div>
    
    <form id="loginForm">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" class="form-control" id="username" 
                   placeholder="Enter username" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" id="password" 
                   placeholder="Enter password" required>
        </div>
        <div id="loginMessage"></div>
        <button type="submit" class="btn btn-primary w-100 btn-lg" id="loginBtn">
            🔓 Login
        </button>
    </form>
    
    <div class="text-center mt-3">
        <small class="text-muted">Default: admin / admin123</small>
    </div>
</div>

<script>
document.getElementById('loginForm').onsubmit = async (e) => {
    e.preventDefault();
    
    const btn = document.getElementById('loginBtn');
    const msgDiv = document.getElementById('loginMessage');
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Logging in...';
    
    try {
        const res = await fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ username, password })
        });
        
        const result = await res.json();
        
        if (result.success) {
            // Store session
            localStorage.setItem('token', result.token);
            localStorage.setItem('user', result.user);
            localStorage.setItem('loginTime', new Date().toISOString());
            
            // Redirect to dashboard
            window.location.href = '/dashboard';
        } else {
            btn.disabled = false;
            btn.innerHTML = '🔓 Login';
            msgDiv.innerHTML = `<div class="alert alert-danger">❌ ${result.message}</div>`;
        }
    } catch(err) {
        btn.disabled = false;
        btn.innerHTML = '🔓 Login';
        msgDiv.innerHTML = `<div class="alert alert-danger">Error: ${err}</div>`;
    }
};

// Check if already logged in
if (localStorage.getItem('token')) {
    window.location.href = '/dashboard';
}
</script>

</body>
</html>
