<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Police Seized Item Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container d-flex justify-content-between">
        <span class="navbar-brand mb-0 h1">👮 Police Seized Item Portal</span>
        <div>
            <a href="/blockchain" class="btn btn-outline-light me-2" target="_blank">
                🔗 Blockchain
            </a>
            <a href="/stats" class="btn btn-info" target="_blank">
                📊 Statistics
            </a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row">
        
        <!-- Left Column: Forms -->
        <div class="col-md-4">
            {% include 'case_form.html' %}
            {% if cases %}
            {% include 'item_form.html' %}
            {% endif %}
        </div>

        <!-- Right Column: Items List -->
        <div class="col-md-8">
            {% if cases %}
            {% include 'items_list.html' %}
            {% else %}
            <div class="alert alert-info">
                <h5>Welcome to Police Seized Item Portal!</h5>
                <p>Register a new case to get started.</p>
            </div>
            {% endif %}
        </div>

    </div>
</div>

</body>
</html>
