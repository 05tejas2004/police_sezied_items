<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Items List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-info">
    <div class="container d-flex justify-content-between">
        <span class="navbar-brand mb-0 h1">🔍 View Items</span>
        <div>
            <a href="/dashboard" class="btn btn-outline-light">← Dashboard</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="card shadow">
        <div class="card-header">
            <div class="row">
                <div class="col-md-4">
                    <input type="text" class="form-control" id="searchInput" 
                           placeholder="Search by code, item name...">
                </div>
                <div class="col-md-3">
                    <select class="form-select" id="filterCase">
                        <option value="">All Cases</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-primary w-100" onclick="filterItems()">
                        🔍 Search
                    </button>
                </div>
            </div>
        </div>
        <div class="card-body">
            <div id="itemsContainer">
                <div class="text-center">
                    <span class="spinner-border text-primary"></span> Loading...
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.qr-card {
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 15px;
    background: white;
}
.qr-img {
    width: 80px;
    height: 80px;
}
.code-tag {
    font-family: monospace;
    font-size: 12px;
    background: #eee;
    padding: 3px 8px;
    border-radius: 3px;
}
</style>

<script>
// Check auth
if (!localStorage.getItem('token')) {
    window.location.href = '/login';
}

// Load cases for filter
async function loadFilterCases() {
    const res = await fetch('/api/cases');
    const cases = await res.json();
    const select = document.getElementById('filterCase');
    cases.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.id;
        opt.textContent = c.case_number;
        select.appendChild(opt);
    });
}

// Load all items
async function loadItems(search = '', caseId = '') {
    const container = document.getElementById('itemsContainer');
    container.innerHTML = '<div class="text-center"><span class="spinner-border text-primary"></span></div>';
    
    let url = '/api/all-items?';
    if (search) url += `search=${search}&`;
    if (caseId) url += `case_id=${caseId}&`;
    
    const res = await fetch(url);
    const items = await res.json();
    
    if (items.length === 0) {
        container.innerHTML = '<p class="text-center text-muted">No items found</p>';
        return;
    }
    
    let html = '<div class="table-responsive"><table class="table table-hover">';
    html += '<thead><tr><th>Case</th><th>Item</th><th>Description</th><th>Code</th><th>QR</th><th>Date</th></tr></thead>';
    html += '<tbody>';
    
    items.forEach(item => {
        html += `<tr>
            <td>${item.case_number}</td>
            <td>${item.item_name}</td>
            <td>${item.description || '-'}</td>
            <td><code class="code-tag">${item.unique_code}</code></td>
            <td><img src="data:image/png;base64,${item.qr_code_image}" class="qr-img"></td>
            <td>${item.created_at}</td>
        </tr>`;
    });
    
    html += '</tbody></table></div>';
    container.innerHTML = html;
}

function filterItems() {
    const search = document.getElementById('searchInput').value;
    const caseId = document.getElementById('filterCase').value;
    loadItems(search, caseId);
}

// Initialize
loadFilterCases();
loadItems();

// Search on enter
document.getElementById('searchInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') filterItems();
});
</script>

</body>
</html>
